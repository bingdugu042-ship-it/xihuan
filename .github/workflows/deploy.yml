name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & build
        run: |
          if [ -f public/CNAME ] && [ -s public/CNAME ]; then
            echo "Custom domain detected -> base=/"
            export GITHUB_PAGES_BASE=/
          else
            echo "Project site -> base=/${{ github.event.repository.name }}/"
            export GITHUB_PAGES_BASE=/${{ github.event.repository.name }}/
          fi
          npm ci
          npm run build
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
